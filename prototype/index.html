<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Tilt Food Cards</title>
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet" />
    <!-- External CSS -->
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <div class="card-container">
        <div class="card">
            <img src="pasta.png" alt="Pasta Primavera" />
            <div class="content">
                <h3 class="title">Pasta Primavera</h3>
                <p class="description">
                    Fresh pasta with seasonal vegetables and Parmesan
                </p>
                <p class="price">$12.99</p>
            </div>
        </div>

        <div class="card">
            <img src="salad.png" alt="Caesar Salad" />
            <div class="content">
                <h3 class="title">Caesar Salad</h3>
                <p class="description">
                    Crisp lettuce, croutons and Caesar dressing
                </p>
                <p class="price">$7.99</p>
            </div>
        </div>

        <div class="card">
            <img src="pizza-3.png" alt="Margherita Pizza" />
            <div class="content">
                <h3 class="title">Margherita Pizza</h3>
                <p class="description">
                    Classic pizza with mozzarella, tomatoes and basil
                </p>
                <p class="price">$9.99</p>
            </div>
        </div>
    </div>

    <!-- External JS -->
    <script src="script.js"></script>
</body>

</html>
